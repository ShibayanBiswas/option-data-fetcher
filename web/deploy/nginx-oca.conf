# nginx reverse proxy for Option Chain Archive (VPS)
# Place at /etc/nginx/sites-available/oca and symlink to sites-enabled.
# Replace YOUR_DOMAIN with your hostname, then: certbot --nginx -d YOUR_DOMAIN

upstream oca_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    client_max_body_size 32m;

    location / {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_pass http://oca_upstream;
    }
}
